# ?? Database (fallback defaults ? TestContainers overrides these) ??
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=test
spring.datasource.password=test

# ?? JPA ??
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ?? Flyway ??
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ?? Disable OAuth2 auto-configuration (no real Google credentials in CI) ??
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# ?? JWT (dummy values for @Value injection ? not used in tests with TestSecurityConfig) ??
app.jwt.secret=ci-test-secret-that-is-at-least-256-bits-long-for-hmac-sha256-algorithm-validation
app.jwt.expiration-ms=86400000

# ?? OAuth2 redirect (dummy ? not used in tests) ??
app.oauth2.redirect-uri=http://localhost:5173/auth/callback